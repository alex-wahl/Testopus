repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
    -   id: black
        files: ^ci/scripts/

-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        args: ["--profile", "black"]
        files: ^ci/scripts/

-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        files: ^ci/scripts/
        args: ["--select=E9,F63,F7,F82", "--show-source", "--statistics", "--ignore=E402"]
        additional_dependencies: [flake8-docstrings]

-   repo: https://github.com/pycqa/pylint
    rev: v3.1.0
    hooks:
    -   id: pylint
        files: ^ci/scripts/
        args: ["--disable=all", "--enable=unused-import,unused-variable,unused-argument,undefined-variable"]

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
    -   id: mypy
        files: ^ci/scripts/
        args: ["--ignore-missing-imports", "--namespace-packages", "--explicit-package-bases", "--config-file=mypy.ini"]
