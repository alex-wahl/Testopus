name: Test Allure Customizer

on:
  push:
    paths:
      - 'ci/scripts/**'
  pull_request:
    paths:
      - 'ci/scripts/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint mypy black isort
          if [ -f ci/requirements.txt ]; then
            pip install -r ci/requirements.txt
          fi

      - name: Run black (code formatter check)
        run: |
          black --check ci/scripts

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --profile black ci/scripts

      - name: Run flake8 (linter)
        run: |
          flake8 ci/scripts --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ci/scripts --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run pylint (static code analysis)
        run: |
          pylint --disable=all --enable=unused-import,unused-variable,unused-argument,undefined-variable ci/scripts

      - name: Run mypy (type checking)
        run: |
          mypy --ignore-missing-imports ci/scripts

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ci/requirements.txt ]; then
            pip install -r ci/requirements.txt
          fi

      - name: Prepare directories
        run: |
          mkdir -p reports/{allure-results,html,junit,screenshots,allure-report,allure-history}

      - name: Run unit tests
        run: |
          cd ci/scripts
          python -m unittest discover tests

      - name: Run customizer script with --dry-run
        run: |
          python ci/scripts/customize_allure_report.py --dry-run --dummy

      - name: Run customizer script to create a dummy report
        run: |
          python ci/scripts/customize_allure_report.py --dummy

      - name: Verify dummy report was created
        run: |
          if [ ! -f "reports/allure-report/index.html" ]; then
            echo "ERROR: Dummy report was not created"
            exit 1
          else
            echo "SUCCESS: Dummy report was created"
            echo "Report contents:"
            ls -la reports/allure-report/
          fi

      - name: Verify report structure and content
        run: |
          # Check essential files
          for file in index.html environment.properties .nojekyll _headers; do
            if [ ! -f "reports/allure-report/$file" ]; then
              echo "ERROR: $file is missing from the report"
              exit 1
            fi
          done

          # Check branch info in environment.properties
          if ! grep -q "Branch=" reports/allure-report/environment.properties; then
            echo "ERROR: Branch information is missing from environment.properties"
            exit 1
          fi

          # Check history directory was created
          if [ ! -d "reports/allure-report/history" ]; then
            echo "ERROR: History directory is missing"
            exit 1
          fi

          echo "SUCCESS: Report structure validation passed"

      # Run test to create mock test results and generate a full report
      - name: Create mock test results
        run: |
          mkdir -p reports/allure-results/sample
          cat > reports/allure-results/sample/result.json << EOF
          {
            "status": "passed",
            "name": "Sample test",
            "labels": [
              { "name": "suite", "value": "Sample Suite" },
              { "name": "testClass", "value": "SampleTest" }
            ],
            "start": 1585124589625,
            "stop": 1585124599625
          }
          EOF

      - name: Run customizer with existing results
        run: |
          python ci/scripts/customize_allure_report.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/
          retention-days: 7

      # Create a summary report
      - name: Create test summary
        run: |
          echo "## Allure Customizer Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dry run test passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dummy report creation passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Report structure validation passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Mock results report generation passed" >> $GITHUB_STEP_SUMMARY

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pytest pytest-cov
          if [ -f ci/requirements.txt ]; then
            pip install -r ci/requirements.txt
          fi

      - name: Run tests with coverage
        run: |
          cd ci/scripts
          coverage run -m unittest discover tests
          coverage report -m
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ci/scripts/coverage.xml
          retention-days: 7

      - name: Create coverage badge
        run: |
          # Assuming a script to generate a coverage badge exists
          # For example purposes, we'll just create a dummy badge
          mkdir -p badges
          echo '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="20"><text x="5" y="15">Coverage</text></svg>' > badges/coverage.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/coverage.svg
          retention-days: 90
