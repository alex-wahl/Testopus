name: Run Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api
          - internal
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean
      custom_flags:
        description: 'Additional test flags'
        required: false
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  checks: write
  pull-requests: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

# Global environment variables
env:
  PYTHON_VERSION: '3.12'
  ALLURE_VERSION: '2.24.0'
  DOCKER_TAG: 'testopus:latest'
  REPORT_DIR: 'reports/allure-report'
  RESULTS_DIR: 'reports/allure-results'
  HISTORY_DIR: 'reports/allure-history'
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  # Debug settings
  DEBUG_MODE: ${{ github.event.inputs.debug_mode == 'true' || false }}
  # Docker environment settings
  PYTHONPATH: /app
  DOCKER_ENV: true
  TZ: Europe/Berlin

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Setup phase
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch
          pip install -r ci/requirements.txt

      # Prepare directories
      - name: Prepare directories
        run: |
          mkdir -p reports/{allure-results,html,junit,screenshots,allure-report,${{ env.HISTORY_DIR }}}
          chmod -R 777 reports
          echo "Listing test directories:"
          find tests -type f -name "test_*.py" | sort

      # Configure Docker for efficient builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Build Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKER_TAG }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Optimize cache for next runs
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Test execution phase
      - name: Run tests
        id: run_tests
        continue-on-error: true  # Continue workflow even if tests fail
        run: |
          # Set test directory based on workflow input
          case "${{ github.event.inputs.test_suite }}" in
            ui)
              TEST_DIR="/app/tests/ui_tests/web"
              REPORT_FILE="report_ui.xml"
              ;;
            api)
              TEST_DIR="/app/tests/api_tests"
              REPORT_FILE="report_api.xml"
              ;;
            internal)
              TEST_DIR="/app/tests/internal_tests"
              REPORT_FILE="report_internal.xml"
              ;;
            *)
              TEST_DIR="/app/tests"
              REPORT_FILE="report_all.xml"
              ;;
          esac

          # Run tests with Docker
          echo "::group::Running tests with Docker"
          docker compose -f docker/docker-compose.yml run --rm testopus \
            --verbose -vv \
            --alluredir=/app/${{ env.RESULTS_DIR }} \
            --html=/app/reports/html/report.html \
            --junitxml=/app/reports/junit/${REPORT_FILE} \
            ${TEST_DIR} ${{ github.event.inputs.custom_flags }}

          # Save exit code for later
          TEST_EXIT_CODE=$?
          echo "test_exit_code=${TEST_EXIT_CODE}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

          exit ${TEST_EXIT_CODE}

      # Debug: List generated report files
      - name: List report files
        if: always()
        run: |
          echo "=== Workspace contents ==="
          ls -la
          echo "=== Reports directory ==="
          ls -la reports/ || echo "No reports directory"
          echo "=== Allure results ==="
          ls -la ${{ env.RESULTS_DIR }}/ || echo "No allure-results directory"
          echo "=== HTML report ==="
          ls -la reports/html/ || echo "No html directory"
          echo "=== JUnit reports ==="
          ls -la reports/junit/ || echo "No junit directory"
          echo "=== Screenshots ==="
          ls -la reports/screenshots/ || echo "No screenshots directory"

      # Clean up Docker containers
      - name: Clean up containers
        if: always()
        run: docker compose -f docker/docker-compose.yml down --remove-orphans

      # Report generation phase
      # Download previous test history
      - name: Download previous test history
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-history
          path: ${{ env.HISTORY_DIR }}

      # Install Allure for report generation
      - name: Set up Allure
        if: always()
        run: |
          wget -O allure-commandline.zip https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/${{ env.ALLURE_VERSION }}/allure-commandline-${{ env.ALLURE_VERSION }}.zip
          unzip -q allure-commandline.zip

      # Generate Allure report with history
      - name: Generate Allure Report
        if: always()
        run: |
          # Check if we have results
          if [ -d "${{ env.RESULTS_DIR }}" ] && [ -n "$(find ${{ env.RESULTS_DIR }} -type f 2>/dev/null)" ]; then
            echo "Allure results found, proceeding with regular report"

            # Copy history to results directory if it exists
            if [ -d "${{ env.HISTORY_DIR }}" ] && [ -n "$(find ${{ env.HISTORY_DIR }} -type f 2>/dev/null)" ]; then
              echo "Copying history to results directory"
              mkdir -p ${{ env.RESULTS_DIR }}/history
              cp -r ${{ env.HISTORY_DIR }}/* ${{ env.RESULTS_DIR }}/history/ 2>/dev/null || true
            fi

            # Generate the report
            echo "Generating Allure report"
            ./allure-${{ env.ALLURE_VERSION }}/bin/allure generate ${{ env.RESULTS_DIR }} -o ${{ env.REPORT_DIR }} --clean

            # Check if report generation was successful
            if [ $? -ne 0 ]; then
              echo "::warning::Allure report generation failed, creating dummy report"
              python3 ci/scripts/customize_allure_report.py --dummy --branch "${{ env.BRANCH_NAME }}"
            else
              # Customize the report
              echo "Customizing Allure report"
              python3 ci/scripts/customize_allure_report.py --history --branch "${{ env.BRANCH_NAME }}"
            fi
          else
            echo "::warning::No Allure results found, creating a dummy report"
            python3 ci/scripts/customize_allure_report.py --dummy --branch "${{ env.BRANCH_NAME }}"
          fi

          # Preserve history for future runs
          echo "Preserving history for future runs"
          mkdir -p ${{ env.HISTORY_DIR }}
          if [ -d "${{ env.REPORT_DIR }}/history" ]; then
            cp -r ${{ env.REPORT_DIR }}/history/* ${{ env.HISTORY_DIR }}/ 2>/dev/null || true
          fi
        env:
          ALLURE_REPORT_DIR: ${{ env.REPORT_DIR }}
          ALLURE_PRESERVE_HISTORY: "true"
          GITHUB_REF: ${{ github.ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}

      # Artifact publishing phase
      # Upload history for future runs
      - name: Upload test history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: ${{ env.HISTORY_DIR }}
          retention-days: 90
          if-no-files-found: warn

      # Upload all test artifacts
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/html/
            reports/junit/
            reports/screenshots/
            ${{ env.RESULTS_DIR }}/
            ${{ env.REPORT_DIR }}/
          retention-days: 90

      # Publish test results to GitHub Actions
      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/junit/report*.xml
          check_name: Test Results

      # GitHub Pages deployment
      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.REPORT_DIR }}
          retention-days: 90

      # Deploy to GitHub Pages via branch
      - name: Deploy to reporting branch
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ env.REPORT_DIR }}
          publish_branch: reporting
          force_orphan: true
          enable_jekyll: false
          cname: ${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: update Allure report [skip ci]"

      # Add PR comment with report links
      - name: Comment PR with Report Links
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const pagesUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}`;
            const testStatus = `${{ steps.run_tests.outcome }}` === 'success' ? '✅ Tests passed' : '❌ Tests failed';

            const comment = `### ${testStatus}

            #### Report Links:
            - [Download Test Reports](${artifactUrl})
            - [View Allure Report](${pagesUrl}) (updated with latest results)

            *Tests run by GitHub Actions workflow*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
