name: Run Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ui
          - api
          - internal
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean
      custom_flags:
        description: 'Additional test flags'
        required: false
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  checks: write
  pull-requests: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

# Pinned external-tool version, bumped here in one place (Dependabot doesn't manage this binary).
env:
  ALLURE_VERSION: "2.42.1"

jobs:
  # Test job
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Hatch
        run: pip install hatch

      # Make sure reports directories exist
      - name: Prepare directories
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/html
          mkdir -p reports/junit
          mkdir -p reports/screenshots
          mkdir -p reports/allure-report
          echo "Listing test directories:"
          find tests -type f -name "test_*.py" | sort
      
      # Setup Docker Buildx for improved caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Prepare cache directories
      - name: Prepare cache directories
        run: |
          mkdir -p /tmp/.buildx-cache
          mkdir -p /tmp/.buildx-cache-new
      
      # Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/Dockerfile', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      # Build Docker image directly without registry login
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: testopus:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      
      # Temp fix for actions/cache performance
      # https://github.com/docker/build-push-action/issues/252
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      
      - name: Run tests
        run: |
          # Run the container as the host UID/GID so report files are owned by the runner
          # (replaces the chmod -R 777 workaround); these feed docker-compose's `user:`.
          export TESTOPUS_UID="$(id -u)" TESTOPUS_GID="$(id -g)"
          if [ "${{ github.event.inputs.test_suite }}" = "ui" ]; then
            docker compose -f docker/docker-compose.yml run --rm testopus --verbose -vv --alluredir=/app/reports/allure-results --html=/app/reports/html/report.html --junitxml=/app/reports/junit/report_ui.xml /app/tests/ui_tests/web ${{ github.event.inputs.custom_flags }}
          elif [ "${{ github.event.inputs.test_suite }}" = "internal" ]; then
            docker compose -f docker/docker-compose.yml run --rm testopus --verbose -vv --alluredir=/app/reports/allure-results --html=/app/reports/html/report.html --junitxml=/app/reports/junit/report_internal.xml /app/tests/internal_tests ${{ github.event.inputs.custom_flags }}
          elif [ "${{ github.event.inputs.test_suite }}" = "api" ]; then
            docker compose -f docker/docker-compose.yml run --rm testopus --verbose -vv --alluredir=/app/reports/allure-results --html=/app/reports/html/report.html --junitxml=/app/reports/junit/report_api.xml /app/tests/api_tests ${{ github.event.inputs.custom_flags }}
          else
            # Default push/PR run: deterministic suites only (internal self-tests + API).
            # The live web UI tests run in the separate `web-e2e` job against a self-hosted
            # Toolshop, because the public site blocks CI datacenter IPs.
            docker compose -f docker/docker-compose.yml run --rm testopus --verbose -vv --alluredir=/app/reports/allure-results --html=/app/reports/html/report.html --junitxml=/app/reports/junit/report_all.xml /app/tests/internal_tests /app/tests/api_tests ${{ github.event.inputs.custom_flags }}
          fi
        env:
          DEBUG_MODE: ${{ github.event.inputs.debug_mode == 'true' }}
          PYTHONPATH: /app
          DOCKER_ENV: true
          PYTEST_ADDOPTS: --verbose
          TZ: Europe/Berlin
      
      - name: Clean up containers
        if: always()
        run: docker compose -f docker/docker-compose.yml down --remove-orphans
      
      # List report files to verify they exist
      - name: List reports directory
        if: always()
        run: |
          echo "=== Workspace contents ==="
          ls -la
          echo "=== Reports directory ==="
          ls -la reports/ || echo "No reports directory"
          echo "=== Allure results ==="
          ls -la reports/allure-results/ || echo "No allure-results directory"
          echo "=== HTML report ==="
          ls -la reports/html/ || echo "No html directory"
          echo "=== JUnit reports ==="
          ls -la reports/junit/ || echo "No junit directory"
          echo "=== Screenshots ==="
          ls -la reports/screenshots/ || echo "No screenshots directory"
      
      # Download previous test history
      - name: Download previous test history
        if: always()
        uses: actions/download-artifact@v4
        continue-on-error: true  # Continue if no history exists yet
        with:
          name: allure-history
          path: reports/allure-history
      
      # Install allure-commandline for report generation
      - name: Set up Allure
        if: always()
        run: |
          wget -O allure-commandline.zip "https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/${ALLURE_VERSION}/allure-commandline-${ALLURE_VERSION}.zip"
          unzip allure-commandline.zip
      
      # Generate Allure report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "reports/allure-results" ] && [ "$(ls -A reports/allure-results)" ]; then
            # Set timezone to Berlin
            export TZ=Europe/Berlin
            
            # Create history directory in results if history exists
            if [ -d "reports/allure-history" ] && [ "$(ls -A reports/allure-history)" ]; then
              echo "Copying previous history to results"
              mkdir -p reports/allure-results/history
              cp -r reports/allure-history/* reports/allure-results/history/ || true
            else
              echo "No previous history found"
            fi
            
            # Generate the report
            "./allure-${ALLURE_VERSION}/bin/allure" generate reports/allure-results -o reports/allure-report --clean
            
            # Check if report generation was successful
            if [ $? -ne 0 ]; then
              echo "::warning::Allure report generation failed, creating dummy report"
              python3 ci/scripts/customize_allure_report.py --dummy
            else
              # Customize the report using our Python script
              python3 ci/scripts/customize_allure_report.py --history
            fi
          else
            echo "No Allure results found, creating a dummy report"
            python3 ci/scripts/customize_allure_report.py --dummy
          fi
        env:
          ALLURE_REPORT_DIR: reports/allure-report
          ALLURE_CREATE_DUMMY: false
          ALLURE_BRANCH: ${{ github.head_ref || github.ref_name }}
          ALLURE_PRESERVE_HISTORY: true
          GITHUB_REF: ${{ github.ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
      
      # Upload test history as a separate artifact to preserve between runs
      - name: Upload test history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: reports/allure-history/
          retention-days: 90  # Keep longer for better historical data
      
      # Upload test reports as artifacts
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/html/
            reports/junit/
            reports/screenshots/
            reports/allure-results/
            reports/allure-report/
          retention-days: 90  # Increase retention period
          
      # Optional: Publish test results
      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3  # v2.24.0
        with:
          files: reports/junit/report*.xml
          check_name: Test Results
          
      # Upload artifact for deployment job
      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports/allure-report
          retention-days: 90  # Increase retention period to match history
      
      # For direct branch upload - GitHub Pages is configured to use the 'reporting' branch
      - name: Deploy to reporting branch
        if: always()
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v3 (v3.x)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/allure-report
          publish_branch: reporting
          force_orphan: true
          enable_jekyll: false
          keep_files: false
          cname: ${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: update Allure report [skip ci]"

      # Comment on PR with Report Links
      - name: Comment PR with Report Links
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const artifactUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            let pagesUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}`;
            
            const comment = `### Test Results
            
            #### Report Links:
            - [Download Test Reports](${artifactUrl})
            - [View Allure Report](${pagesUrl}) (updated with latest results)
            
            *Tests run by GitHub Actions workflow*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Fast advisory static-analysis gate: lint + type-check + a collection smoke test.
  # Advisory (continue-on-error) for now — the existing codebase isn't fully lint/type-clean;
  # flip to a hard gate once it is. `--collect-only` cheaply catches pytest/plugin-compat
  # breakage on Dependabot PRs (per CLAUDE.md "Dependency currency").
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Hatch
        run: pip install hatch
      - name: Lint and type-check
        run: |
          hatch run lint
          hatch run typecheck
      - name: Collect tests (plugin/compat smoke)
        run: hatch run test:run --collect-only

  # Web UI tests against a SELF-HOSTED Toolshop. The public site blocks CI datacenter IPs,
  # so we boot the official Toolshop images, seed the DB, and run the Selenium suite natively
  # on the runner (which ships Chrome). Advisory for now — drop continue-on-error once green.
  web-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SPRINT: sprint5
      DISABLE_LOGGING: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Fetch Toolshop compose 📥
        run: |
          curl -fsSL -o toolshop-compose.yml \
            https://raw.githubusercontent.com/testsmith-io/practice-software-testing/main/docker-compose.prod.yml

      - name: Start Toolshop 🐳
        run: docker compose -f toolshop-compose.yml up -d --pull always --quiet-pull

      - name: Wait for MariaDB 🗄️
        run: |
          for i in $(seq 1 30); do
            if docker compose -f toolshop-compose.yml exec -T mariadb \
                 mysqladmin ping -h localhost -u root -proot --silent 2>/dev/null; then
              echo "MariaDB ready"; exit 0
            fi
            echo "db attempt $i/30 — waiting 2s"; sleep 2
          done
          echo "MariaDB never came up"; docker compose -f toolshop-compose.yml logs mariadb; exit 1

      - name: Seed database 🌱
        run: docker compose -f toolshop-compose.yml exec -T laravel-api php artisan migrate:fresh --seed

      - name: Wait for API + UI 🕐
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8091/status >/dev/null && { echo "API ready"; break; }
            echo "api attempt $i/30"; sleep 3
          done
          for i in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4200)" = "200" ]; then
              echo "UI ready"; break
            fi
            echo "ui attempt $i/60 — waiting 5s"; sleep 5
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install project
        run: pip install -e ".[test,tools,api]"

      - name: Run web UI tests 🧪
        env:
          TOOLSHOP_WEB_URL: http://localhost:4200
          TOOLSHOP_API_URL: http://localhost:8091
          DOCKER_ENV: "true"
          PYTHONPATH: .
          TZ: Europe/Berlin
        run: |
          mkdir -p reports/junit
          pytest tests/ui_tests/web -vv --junitxml=reports/junit/report_web.xml

      - name: Toolshop logs (on failure) 🔍
        if: failure()
        run: docker compose -f toolshop-compose.yml logs --tail=150

      - name: Upload web reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-reports
          path: reports/junit/
          retention-days: 30