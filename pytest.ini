[pytest]
pythonpath = .
# The `tools/testiny` namespace starts with "test", so a public symbol such as
# `testiny_case_to_spec` would match pytest's default `test*` function-collection glob
# when imported into a test module. Require the `test_` prefix (every suite already uses
# it) so helpers in that namespace are never mistaken for tests.
python_functions = test_*
filterwarnings =
    ignore: .*Argument name-based*. :DeprecationWarning
log_cli = 1
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %d-%m-%Y %H:%M:%S
# --alluredir is intentionally NOT set here (Allure capture stays opt-in; pass it
# explicitly or use the hatch report scripts). --strict-markers turns an unregistered
# marker into an error rather than a silent warning. --import-mode=importlib lets test
# files share a basename across dirs (e.g. the web and api test_products.py) without
# needing __init__.py in every test package.
addopts = --strict-markers --import-mode=importlib
markers =
    feature: high-level feature grouping for Allure
    story: user story grouping for Allure
    severity: Allure severity (blocker/critical/normal/minor/trivial)
    tag: free-form Allure tag(s)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function